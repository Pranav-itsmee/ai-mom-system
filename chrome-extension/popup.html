<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h2 { font-size: 14px; color: #38bdf8; font-weight: 700; }
    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin: 14px 0 4px;
    }
    input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 7px;
      color: #f1f5f9;
      padding: 8px 10px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #38bdf8; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button {
      flex: 1;
      padding: 9px;
      background: #0ea5e9;
      border: none;
      border-radius: 7px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #0284c7; }
    button:disabled { background: #334155; color: #64748b; cursor: default; }
    button.secondary { background: #1e293b; border: 1px solid #334155; color: #94a3b8; }
    button.secondary:hover { background: #334155; }
    .msg {
      text-align: center;
      font-size: 11px;
      margin-top: 8px;
      height: 16px;
    }
    .msg.ok    { color: #34d399; }
    .msg.err   { color: #f87171; }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #334155;
      margin: 16px 0 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e293b;
    }
    .status {
      margin-top: 14px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      line-height: 1.4;
    }
    .status.idle      { background: #1e293b; color: #64748b; }
    .status.recording { background: #450a0a; color: #fca5a5; }
    .status.uploading { background: #431407; color: #fcd34d; }
    .status.done      { background: #052e16; color: #86efac; }
    .status.error     { background: #450a0a; color: #fca5a5; }
    .divider { border: none; border-top: 1px solid #1e293b; margin: 14px 0 0; }
    .logged-in-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #052e16;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 12px;
      color: #86efac;
    }
    .logged-in-row button {
      flex: none;
      padding: 4px 10px;
      font-size: 11px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
    }
    .logged-in-row button:hover { background: #334155; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px">🧠</span>
    <h2>AI MOM Recorder</h2>
  </div>

  <!-- ── API URL ── -->
  <label>Backend API URL</label>
  <input id="apiUrl" placeholder="https://mom.mosaique.work/api/v1" />

  <!-- ── Login section ── -->
  <div class="section-title">Account</div>

  <div id="loginForm">
    <label>Email</label>
    <input id="email" type="email" placeholder="you@company.com" autocomplete="email" />
    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
    <div class="btn-row">
      <button id="loginBtn">Login</button>
    </div>
    <p class="msg" id="loginMsg"></p>
  </div>

  <div id="loggedInRow" style="display:none">
    <div class="logged-in-row">
      <span id="loggedInEmail"></span>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <hr class="divider" />
  <div class="status idle" id="status">Idle — join a Google Meet to start recording</div>

  <script src="popup.js"></script>
</body>
</html>
