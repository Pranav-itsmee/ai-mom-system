services:

  # ── MySQL ─────────────────────────────────────────────────────────────────────
  shared-mysql:
    image: mysql:8.0
    container_name: shared-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_mom_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dev-net
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "-proot", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Backend (Express + FFmpeg) ────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mom_app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: shared-mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      FRONTEND_URL: https://mom.mosaique.work
      GOOGLE_REDIRECT_URI: https://mom.mosaique.work/api/v1/auth/google/callback
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      BOT_PROFILE_DIR: /app/bot-chrome-profile
      WHISPER_URL: http://mom-whisper:9000
    ports:
      - "8011:5000"
    networks:
      dev-net:
        aliases:
          - mom-backend
    volumes:
      - temp_files:/app/temp
      - backend_logs:/app/logs
      - avatars:/app/public/avatars
      - bot_profile:/app/bot-chrome-profile
    depends_on:
      shared-mysql:
        condition: service_healthy
      whisper:
        condition: service_started

  # ── Whisper transcription service ────────────────────────────────────────────
  whisper:
    build:
      context: ./whisper-service
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: medium
    container_name: mom_whisper
    restart: unless-stopped
    environment:
      WHISPER_MODEL: medium
      JP_RATIO_THRESHOLD: "0.08"
    ports:
      - "9000:9000"
    networks:
      dev-net:
        aliases:
          - mom-whisper
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Frontend (Next.js standalone) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        BACKEND_URL: http://mom-backend:5000
    environment:
      NODE_ENV: production
      BACKEND_URL: http://mom-backend:5000
    container_name: mom_frontend
    restart: unless-stopped
    ports:
      - "8012:3000"
    networks:
      - dev-net
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 1G

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  temp_files:
  backend_logs:
  avatars:
  bot_profile:

networks:
  dev-net:
    external: true
