version: '3.8'

services:

  # ── MySQL ────────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ai_mom_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Local Whisper (faster-whisper transcription sidecar) ─────────────────────
  whisper:
    build:
      context: ./whisper-service
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: tiny
    restart: unless-stopped
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ── Backend (Express + Puppeteer + FFmpeg) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Override DB_HOST so backend connects to the db container, not localhost
      DB_HOST: db
      # Override Windows paths from .env — Docker container uses Linux FFmpeg
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      # Local Whisper sidecar — replaces OpenAI Whisper API
      WHISPER_URL: http://whisper:9000
    volumes:
      - temp_files:/app/temp
      - backend_logs:/app/logs
      - avatars:/app/public/avatars
    depends_on:
      db:
        condition: service_healthy
      whisper:
        condition: service_healthy

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser talks to backend via the host machine, not the Docker network
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  temp_files:
  backend_logs:
  avatars:
