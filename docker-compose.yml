services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: mom_app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: shared-mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      MYSQL_HOST: shared-mysql
      MYSQL_PORT: "3306"
      FRONTEND_URL: https://mom.mosaique.link
      GOOGLE_REDIRECT_URI: https://mom.mosaique.link/auth/google/callback
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      BOT_PROFILE_DIR: /app/bot-chrome-profile
    volumes:
      - temp_files:/app/temp
      - backend_logs:/app/logs
      - avatars:/app/public/avatars
      - bot_profile:/app/bot-chrome-profile
      - backend_temp:/app/backend/temp
    ports:
      - "8011:5000"
    networks:
      dev-net:
        aliases:
          - mom-backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        BACKEND_URL: http://mom-backend:5000
    environment:
      BACKEND_URL: http://mom-backend:5000
    restart: unless-stopped
    ports:
      - "8012:3000"
    networks:
      - dev-net
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  bot_profile:
  backend_temp:
  backend_logs:
  avatars:
  temp_files:

networks:
  dev-net:
    external: true