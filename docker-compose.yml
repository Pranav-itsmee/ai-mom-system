services:

  # ── Local Whisper (faster-whisper transcription sidecar) ─────────────────────
  whisper:
    build:
      context: ./whisper-service
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: tiny
    restart: unless-stopped
    networks:
      - dev-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ── Backend (Express + Puppeteer + FFmpeg) ───────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mom_app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: shared-mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      MYSQL_HOST: shared-mysql
      MYSQL_PORT: "3306"
      FRONTEND_URL: https://mom.mosaique.work
      GOOGLE_REDIRECT_URI: https://mom.mosaique.work/auth/google/callback
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      BOT_PROFILE_DIR: /app/bot-chrome-profile
      WHISPER_URL: http://mom_whisper:9000
    ports:
      - "8011:5000"
    networks:
      dev-net:
        aliases:
          - mom-backend
    volumes:
      - temp_files:/app/temp
      - backend_logs:/app/logs
      - avatars:/app/public/avatars
      - bot_profile:/app/bot-chrome-profile
      - backend_temp:/app/backend/temp
    depends_on:
      whisper:
        condition: service_healthy

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        BACKEND_URL: http://mom-backend:5000
    environment:
      BACKEND_URL: http://mom-backend:5000
    container_name: mom_frontend
    restart: unless-stopped
    ports:
      - "8012:3000"
    networks:
      - dev-net
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 1G

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  bot_profile:
  backend_temp:
  backend_logs:
  avatars:
  temp_files:

networks:
  dev-net:
    external: true
