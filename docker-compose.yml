version: '3.8'

services:

  # ── MySQL ────────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ai_mom_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend (Express + Puppeteer + FFmpeg) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Override DB_HOST so backend connects to the db container, not localhost
      DB_HOST: db
    volumes:
      - temp_files:/app/temp
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser talks to backend via the host machine, not the Docker network
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  temp_files:
  backend_logs:
