server {
    listen 80;
    server_name mom.mosaique.link;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mom.mosaique.link;

    ssl_certificate     /etc/letsencrypt/live/mom.mosaique.link/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mom.mosaique.link/privkey.pem;

    # All traffic goes to Next.js — it handles /api/ rewrites internally
    location / {
        proxy_pass         http://localhost:8012;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_read_timeout 60s;
    }
}
